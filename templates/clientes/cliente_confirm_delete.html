{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4 border-danger">
            <div class="card-body text-center">
                <h4 class="text-danger">¿Estás seguro?</h4>
                <p>Vas a eliminar permanentemente al cliente <strong>{{ cliente.nombre_completo }}</strong>. Esta acción no se puede deshacer.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'cliente_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
